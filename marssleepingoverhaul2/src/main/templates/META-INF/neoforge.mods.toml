license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="CosmicDan"
description='''
Replaces skip-to-day on sleep with a beautiful panoramic timelapse, and more!
'''
logoFile = "logo.png"
displayURL = "https://www.curseforge.com/minecraft/mc-mods/sleepingoverhaul2"

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[mixins]]
config = "sleepingoverhaul-neoforge.mixins.json"

[[mixins]]
config = "sleepingoverhaul-common.mixins.json"
